[server]
port = 8080
mode = "release"
timeout = 30
read_timeout = 15
write_timeout = 15
idle_timeout = 60
max_header_bytes = 1048576
start_timeout = 15
shutdown_timeout = 30

[database]
host = "localhost"
port = 5432
user = "postgres"
password = "your-password"
dbname = "postgres"
sslmode = "disable"

[jwt]
secret = "your-production-secret-key"
expire_time = 7200

[cache]
default_expiration = 3600
cleanup_interval = 600

[log]
level = "info"
format = "json"
add_source = false

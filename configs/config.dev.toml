[server]
port = 8080
mode = "debug"
timeout = 30
allow_origins = [
    "http://localhost:3000",
    "http://localhost:5173",
    "http://127.0.0.1:3000",
    "http://127.0.0.1:5173",
]

[database]
host = "localhost"
port = 5432
user = "postgres"
password = "postgres"
dbname = "postgres"
sslmode = "disable"

[jwt]
secret = "your-secret-key-change-in-production"
expire_time = 7200

[cache]
default_expiration = 3600
cleanup_interval = 600

[log]
level = "debug"
format = "text"
add_source = true
